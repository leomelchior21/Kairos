<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos Inquiry</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/inquiry.css">
</head>
<body>
<div id="screen-landing" class="screen landing-screen">
  <canvas id="kai-canvas"></canvas>
  <div class="wordmark">Kairos</div>
  <section class="landing-content">
    <div class="landing-title">Kairos</div>
    <div class="landing-sub">um guia para hackear ideias</div>
    <div class="landing-box">
      <div class="landing-input-wrap">
        <textarea class="landing-input" id="landing-input" placeholder="Que ideia voce quer explorar?" rows="1" onkeydown="handleLandingKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="ask-btn" onclick="goToGrade()">Comecar</button>
    </div>
  </section>
</div>

<div id="screen-grade" class="screen intro-screen hidden">
  <section class="intro-card">
    <div class="brand-row">
      <div>
        <div class="brand-name">Kai</div>
        <div class="brand-sub">language adjusts by year</div>
      </div>
      <div class="mission-pill">6-9</div>
    </div>
    <h2 class="intro-title">Which year are you in?</h2>
    <p class="intro-copy">Kai will tune vocabulary, hints, and challenge size for your grade.</p>
    <div class="grade-grid">
      <button class="grade-btn" onclick="selectGrade('6o ano')"><span class="grade-num">6</span><span class="grade-label">year</span></button>
      <button class="grade-btn" onclick="selectGrade('7o ano')"><span class="grade-num">7</span><span class="grade-label">year</span></button>
      <button class="grade-btn" onclick="selectGrade('8o ano')"><span class="grade-num">8</span><span class="grade-label">year</span></button>
      <button class="grade-btn" onclick="selectGrade('9o ano')"><span class="grade-num">9</span><span class="grade-label">year</span></button>
    </div>
  </section>
</div>

<div id="screen-main" class="screen hidden">
  <header class="main-header">
    <div class="kai-mark" aria-hidden="true"></div>
    <div class="header-title">
      <strong>Kai</strong>
      <span id="question-subtitle">Inquiry path</span>
    </div>
    <div class="status-pills">
      <span class="pill year" id="year-pill">year</span>
      <span class="pill" id="type-pill">type</span>
      <span class="pill mastery" id="mastery-pill">lost</span>
      <span class="pill" id="score-pill">0%</span>
    </div>
  </header>
  <div class="inquiry-shell">
    <aside class="map-pane">
      <div class="pane-head">
        <div class="pane-kicker">fixed mind map</div>
        <div class="pane-title">Steps you built</div>
      </div>
      <div class="map-track" id="mindmap-track"></div>
    </aside>
    <main class="interaction-pane">
      <div class="progress-wrap">
        <div class="progress-top">
          <div class="step-label" id="step-label">Hook</div>
          <div class="step-goal" id="step-goal">one idea per screen</div>
        </div>
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="interaction-scroll">
        <section class="interaction-card" id="interaction-panel"></section>
      </div>
    </main>
  </div>
</div>

<script src="/inquiry-ui.js"></script>
</body>
</html>
